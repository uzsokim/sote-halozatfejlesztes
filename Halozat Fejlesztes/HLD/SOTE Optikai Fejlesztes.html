<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOTE Optikai Hálózat – Mixed Tier Topológia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e0e0e0;overflow:hidden;height:100vh}
#toolbar{position:fixed;top:0;left:0;right:0;height:48px;background:#1a1d27;border-bottom:1px solid #2a2d3a;display:flex;align-items:center;padding:0 16px;z-index:100;gap:12px}
#toolbar h1{font-size:14px;font-weight:600;color:#8bb4f0;white-space:nowrap}
#toolbar .sep{width:1px;height:24px;background:#2a2d3a}
.btn{padding:4px 10px;border-radius:6px;border:1px solid #2a2d3a;background:#1e2130;color:#aab;font-size:11px;cursor:pointer;white-space:nowrap}
.btn:hover{background:#252840;border-color:#3a3d5a}
.btn.active{background:#2a3a5a;border-color:#4a6a9a;color:#8bb4f0}
#legend{position:fixed;bottom:12px;left:12px;background:#1a1d27ee;border:1px solid #2a2d3a;border-radius:8px;padding:10px 14px;z-index:100;font-size:11px;line-height:1.8}
.leg-item{display:flex;align-items:center;gap:8px}
.leg-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0}
#stats{position:fixed;bottom:12px;right:12px;background:#1a1d27ee;border:1px solid #2a2d3a;border-radius:8px;padding:10px 14px;z-index:100;font-size:11px;line-height:1.8}
#canvas{position:absolute;top:48px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#canvas:active{cursor:grabbing}
#world{transform-origin:0 0;position:absolute;width:4000px;height:3000px}
.node-group{position:absolute;cursor:pointer;transition:filter .15s}
.node-group:hover{filter:brightness(1.2)}
.node-box{border-radius:8px;padding:8px 10px;min-width:100px;border:1.5px solid;position:relative}
.node-box .name{font-weight:600;font-size:11px;white-space:nowrap}
.node-box .info{font-size:9.5px;opacity:.75;margin-top:2px;white-space:nowrap}
.node-box .tier-badge{position:absolute;top:-8px;right:6px;font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.5px}
.core .node-box{background:#1a3a2a;border-color:#2d8a55;color:#7ddf9b}
.core .tier-badge{background:#2d8a55;color:#0a1a10}
.distro .node-box{background:#2a2440;border-color:#7a5adf;color:#b89aff}
.distro .tier-badge{background:#7a5adf;color:#1a1430}
.access .node-box{background:#1a2a3a;border-color:#4a8abf;color:#8ac4f0}
.access .tier-badge{background:#4a8abf;color:#0a1520}
.access-lila .node-box{background:#2a1a2a;border-color:#bf4aaf;color:#e08ad8}
.access-lila .tier-badge{background:#bf4aaf;color:#1a0a1a}
.mpls .node-box{background:#2a2520;border-color:#bf8a3a;color:#e0c080}
.mpls .tier-badge{background:#bf8a3a;color:#1a1510}
.passive .node-box{background:#2a2a1a;border-color:#bfbf3a;color:#e0e080;border-style:dashed}
.passive .tier-badge{background:#bfbf3a;color:#1a1a10}
.warn .node-box{border-color:#e04040 !important;box-shadow:0 0 8px #e0404040}
svg.links{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.link-line{stroke-width:1.5;fill:none}
.link-os2{stroke:#4a8abf}
.link-mmf{stroke:#bf8a3a}
.link-om3{stroke:#5abf5a}
.link-om4{stroke:#3abfbf}
.link-om1{stroke:#bf5a3a}
.link-unknown{stroke:#bf3a3a;stroke-dasharray:6 3}
.link-mpls{stroke:#8a8a5a;stroke-dasharray:4 4;stroke-width:1}
.link-label{position:absolute;font-size:8.5px;padding:1px 4px;border-radius:3px;background:#1a1d27dd;color:#aaa;white-space:nowrap;pointer-events:none;transform:translate(-50%,-50%)}
.link-label.problem{color:#ff6a6a;background:#2a1015dd}
.tooltip{position:fixed;z-index:200;background:#1e2130;border:1px solid #3a3d5a;border-radius:8px;padding:10px 14px;font-size:11px;line-height:1.6;max-width:300px;pointer-events:none;display:none}
.tooltip .tt-title{font-weight:700;color:#8bb4f0;margin-bottom:4px}
.tooltip .tt-warn{color:#ff6a6a;margin-top:4px}
#filter-bar{display:flex;gap:4px;flex-wrap:wrap}
</style>
</head>

  {from:'janos_eloszt',to:'pak_eloszt',label:'?',type:'unknown'},
  {from:'pak_eloszt',to:'pak_kut',label:'?',type:'unknown'},
  {from:'pak_eloszt',to:'erseb',label:'?',type:'unknown'},
  {from:'pak_eloszt',to:'emk',label:'?',type:'unknown'},
  {from:'erseb',to:'v70',label:'?',type:'unknown',problem:'Felmérés szükséges'},
];

// Remove duplicate Kálvária (keep lila version)
const filteredNodes = nodes.filter(n => n.id !== 'kalvaria');
const filteredLinks = links.filter(l => l.from !== 'kalvaria' && l.to !== 'kalvaria');

let scale = 0.6, panX = 100, panY = 20;
let dragging = false, lastX, lastY;
let activeFilter = 'all';

const world = document.getElementById('world');
const canvas = document.getElementById('canvas');
const svgLinks = document.getElementById('svg-links');
const tooltip = document.getElementById('tooltip');

function toggleFilter(f) {
  activeFilter = f;
  document.querySelectorAll('#filter-bar .btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(f === 'all' ? 'mind' : f === 'warn' ? 'problém' : f));
  });
  render();
}

function render() {
  // Clear
  world.querySelectorAll('.node-group,.link-label').forEach(e => e.remove());
  svgLinks.innerHTML = '';

  const visibleNodes = filteredNodes.filter(n => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'kkt') return n.branch === 'kkt' || n.type === 'core';
    if (activeFilter === 'bkt') return n.branch === 'bkt' || n.type === 'core';
    if (activeFilter === 'warn') return n.warn;
    return true;
  });
  const visibleIds = new Set(visibleNodes.map(n => n.id));

  // Draw links
  filteredLinks.forEach(l => {
    if (!visibleIds.has(l.from) || !visibleIds.has(l.to)) return;
    const from = filteredNodes.find(n => n.id === l.from);
    const to = filteredNodes.find(n => n.id === l.to);
    if (!from || !to) return;

    const x1 = from.x + 60, y1 = from.y + 20;
    const x2 = to.x + 60, y2 = to.y + 20;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);

    let cls = 'link-line ';
    if (l.type === 'os2') cls += 'link-os2';
    else if (l.type === 'mmf') cls += 'link-mmf';
    else if (l.type === 'om3') cls += 'link-om3';
    else if (l.type === 'om4') cls += 'link-om4';
    else if (l.type === 'om1') cls += 'link-om1';
    else if (l.type === 'mpls') cls += 'link-mpls';
    else cls += 'link-unknown';
    line.setAttribute('class', cls);
    svgLinks.appendChild(line);

    // Label
    if (l.label) {
      const lbl = document.createElement('div');
      lbl.className = 'link-label' + (l.problem ? ' problem' : '');
      lbl.style.left = ((x1 + x2) / 2) + 'px';
      lbl.style.top = ((y1 + y2) / 2) + 'px';
      lbl.textContent = l.label;
      if (l.problem) lbl.title = l.problem;
      world.appendChild(lbl);
    }
  });

  // Draw nodes
  visibleNodes.forEach(n => {
    const div = document.createElement('div');
    div.className = 'node-group ' + n.type + (n.warn ? ' warn' : '');
    div.style.left = n.x + 'px';
    div.style.top = n.y + 'px';

    const tierLabel = n.type === 'core' ? 'CORE' :
                      n.type === 'distro' ? 'DISTRO' :
                      n.type === 'access' ? 'ACCESS' :
                      n.type === 'access-lila' ? 'LILA' :
                      n.type === 'passive' ? 'ELOSZTÓ' :
                      n.type === 'mpls' ? 'MPLS' : '';

    div.innerHTML = `<div class="node-box">
      <div class="tier-badge">${tierLabel}</div>
      <div class="name">${n.name}</div>
      <div class="info">${n.info}</div>
    </div>`;

    div.addEventListener('mouseenter', e => showTooltip(e, n));
    div.addEventListener('mouseleave', () => tooltip.style.display = 'none');
    world.appendChild(div);
  });

  updateTransform();
  updateStats();
}

function showTooltip(e, n) {
  let html = `<div class="tt-title">${n.name}</div>`;
  html += `<div>Típus: ${n.type === 'core' ? 'Core' : n.type === 'distro' ? 'Disztribúció' : n.type.includes('access') ? 'Access' : n.type === 'passive' ? 'Passzív elosztó' : 'MPLS L3'}</div>`;
  html += `<div>Ág: ${n.branch === 'bkt' ? 'BKT' : n.branch === 'kkt' ? 'KKT' : 'MPLS/Távoli'}</div>`;
  if (n.rendezok) html += `<div>Rendezők: ${n.rendezok}</div>`;

  const myLinks = filteredLinks.filter(l => l.from === n.id || l.to === n.id);
  if (myLinks.length) {
    html += '<div style="margin-top:4px;border-top:1px solid #2a2d3a;padding-top:4px">Kapcsolatok:</div>';
    myLinks.forEach(l => {
      const other = l.from === n.id ? l.to : l.from;
      const otherNode = filteredNodes.find(nn => nn.id === other);
      html += `<div style="margin-left:8px">→ ${otherNode ? otherNode.name : other}: ${l.label || '?'}</div>`;
    });
  }
  if (n.warn) html += `<div class="tt-warn">⚠ ${n.warn}</div>`;
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = Math.min(e.clientX + 12, window.innerWidth - 320) + 'px';
  tooltip.style.top = Math.min(e.clientY + 12, window.innerHeight - 200) + 'px';
}

function updateStats() {
  const cores = filteredNodes.filter(n => n.type === 'core').length;
  const distros = filteredNodes.filter(n => n.type === 'distro').length;
  const accesses = filteredNodes.filter(n => n.type === 'access' || n.type === 'access-lila').length;
  const passives = filteredNodes.filter(n => n.type === 'passive').length;
  const mpls = filteredNodes.filter(n => n.type === 'mpls').length;
  const totalRend = filteredNodes.reduce((s, n) => s + (n.rendezok || 0), 0);
  const problems = filteredNodes.filter(n => n.warn).length + filteredLinks.filter(l => l.problem).length;

  document.getElementById('stats').innerHTML = `
    <div><b style="color:#8bb4f0">Összesítés</b></div>
    <div>Core eszközök: <b>${cores * 2}</b> (${cores} helyszín)</div>
    <div>Disztribúció: <b>${distros}</b> épület</div>
    <div>Access: <b>${accesses}</b> épület</div>
    <div>Passzív elosztó: <b>${passives}</b></div>
    <div>MPLS helyszín: <b>${mpls}</b></div>
    <div>Össz rendező: <b>${totalRend}</b></div>
    <div style="color:#ff6a6a">Problémák: <b>${problems}</b></div>
  `;
}

function updateTransform() {
  world.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
}

canvas.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX += e.clientX - lastX;
  panY += e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  updateTransform();
});
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mouseleave', () => dragging = false);
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const d = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.2, Math.min(2, scale * d));
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  updateTransform();
}, {passive: false});

function resetView() { scale = 0.6; panX = 100; panY = 20; updateTransform(); }
function zoomIn() { scale = Math.min(2, scale * 1.2); updateTransform(); }
function zoomOut() { scale = Math.max(0.2, scale / 1.2); updateTransform(); }

// Touch support
let touches = {};
canvas.addEventListener('touchstart', e => {
  for (const t of e.changedTouches) touches[t.identifier] = {x: t.clientX, y: t.clientY};
}, {passive: true});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const ids = Object.keys(touches);
  if (e.touches.length === 1 && ids.length === 1) {
    const t = e.touches[0];
    const prev = touches[t.identifier];
    if (prev) { panX += t.clientX - prev.x; panY += t.clientY - prev.y; }
    touches[t.identifier] = {x: t.clientX, y: t.clientY};
    updateTransform();
  }
}, {passive: false});
canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) delete touches[t.identifier];
});

render();
</script>
</body>
</html>
